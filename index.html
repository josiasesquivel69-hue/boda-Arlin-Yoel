<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Invitación de Boda</title>
<style>
  body {
    margin:0;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    overflow-x:hidden;
    background:#e0f7f1;
    color:#004d40;
  }

  /* Sobre inicial */
  #sobre {
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    cursor:pointer;
    position:relative;
    perspective:1000px;
  }

  .sobre-img {
    width:300px;
    height:200px;
    background: linear-gradient(to right, #a7ffeb, #64ffda);
    border-radius:15px;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:4rem;
    font-weight:bold;
    color:white;
    transform-style: preserve-3d;
    transition: transform 1s ease;
    box-shadow: 0 10px 20px rgba(0,0,0,0.3);
  }

  /* Pantalla principal */
  #principal {
    display:none;
    flex-direction:column;
    align-items:center;
  }

  /* Foto principal ocupando toda la pantalla */
  .foto-principal {
    position: relative;
    width:100%;
    max-height:90vh;
    overflow:hidden;
  }
  .foto-principal img {
    width:100%;
    height:100%;
    object-fit:cover;
  }
  .texto-foto {
    position:absolute;
    bottom:30px;
    left:50%;
    transform:translateX(-50%);
    text-align:center;
    color:white;
    font-weight:bold;
    text-shadow:2px 2px 10px rgba(0,0,0,0.7);
  }
  .texto-foto h1 { font-size:3rem; margin:0; }
  .texto-foto p { font-size:2rem; margin:5px 0 0 0; }

  /* Slideshow */
  .slideshow-container {
    position: relative;
    max-width: 800px;
    margin: 50px auto;
    border-radius: 15px;
    overflow: hidden;
    box-shadow: 0 5px 15px rgba(0,0,0,0.2);
  }
  .slides { display:none; width:100%; height:500px; object-fit:cover; }
  .prev, .next {
    cursor:pointer;
    position:absolute;
    top:50%;
    margin-top:-25px;
    padding:10px;
    color:white;
    font-weight:bold;
    font-size:2rem;
    border-radius:50%;
    background: rgba(0,77,64,0.3);
    user-select:none;
    transition: background 0.3s;
  }
  .prev:hover, .next:hover { background: rgba(0,77,64,0.6); }
  .prev { left:10px; }
  .next { right:10px; }

  /* Mensaje final */
  .mensaje { text-align:center; padding:80px 20px; font-size:1.5rem; }
  .mensaje p { margin:20px 0; }
  .mensaje .contacto { font-weight:bold; color:#004d40; }

</style>
</head>
<body>

<!-- Sobre inicial -->
<div id="sobre">
  <div class="sobre-img" id="sobreImg">A & Y</div>
</div>

<!-- Pantalla principal -->
<div id="principal">

  <!-- Foto principal grande -->
  <div class="foto-principal">
    <img src="foto1.jpeg" alt="Foto principal">
    <div class="texto-foto">
      <h1>Arlin & Yoel</h1>
      <p>11/04/26</p>
    </div>
  </div>

  <!-- Slideshow -->
  <div class="slideshow-container">
    <img class="slides" src="foto2.jpeg" alt="Foto 2">
    <img class="slides" src="foto3.jpeg" alt="Foto 3">
    <span class="prev" onclick="changeSlide(-1)">&#10094;</span>
    <span class="next" onclick="changeSlide(1)">&#10095;</span>
  </div>

  <!-- Mensaje final -->
  <div class="mensaje">
    <p>Su compañía es nuestro regalo más preciado,</p>
    <p>sin embargo, cualquier muestra de cariño hacia nosotros puede realizarla a través de:</p>
    <p class="contacto">88869869</p>
    <p>O en una cajita que estará en la iglesia el día de la boda.</p>
  </div>

</div>

<!-- Música -->
<audio autoplay loop>
  <source src="musica.mp3" type="audio/mpeg">
  Tu navegador no soporta audio.
</audio>

<script>
  const sobreImg = document.getElementById("sobreImg");
  const principal = document.getElementById("principal");
  const sobre = document.getElementById("sobre");

  // Al hacer clic, animar sobre y mostrar principal
  sobreImg.addEventListener("click", () => {
    sobreImg.style.transform = "rotateX(90deg)";
    setTimeout(() => {
      sobre.style.display="none";
      principal.style.display="flex";
    },1000);
  });

  // Slideshow
  let slideIndex=0;
  const slides=document.getElementsByClassName("slides");

  function showSlide(n){
    if(n>=slides.length) slideIndex=0;
    if(n<0) slideIndex=slides.length-1;
    for(let i=0;i<slides.length;i++) slides[i].style.display="none";
    slides[slideIndex].style.display="block";
  }

  function changeSlide(n){
    slideIndex+=n;
    showSlide(slideIndex);
  }

  function autoSlide(){
    slideIndex++;
    showSlide(slideIndex);
    setTimeout(autoSlide,4000);
  }

  showSlide(slideIndex);
  autoSlide();
</script>

</body>
</html>
