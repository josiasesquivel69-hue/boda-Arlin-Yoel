<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Invitación de Boda</title>
<style>
  body {
    margin: 0;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background: #fff0f5;
    color: #333;
    overflow-x: hidden;
  }

  /* Inicio con iniciales animadas */
  .inicio {
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    font-size: 6rem;
    font-weight: bold;
    letter-spacing: 2rem;
    background: linear-gradient(to right, #fbc2eb, #a6c1ee);
    color: white;
    text-shadow: 2px 2px 10px rgba(0,0,0,0.3);
    animation: fadeIn 2s ease forwards;
  }

  @keyframes fadeIn {
    0% {opacity: 0; transform: scale(0.8);}
    100% {opacity: 1; transform: scale(1);}
  }

  /* Slideshow elegante */
  .slideshow-container {
    position: relative;
    max-width: 800px;
    margin: 50px auto;
    border-radius: 20px;
    overflow: hidden;
    box-shadow: 0 10px 30px rgba(0,0,0,0.2);
  }
  .slides {
    display: none;
    width: 100%;
    height: 500px;
    object-fit: cover;
    animation: fadeSlide 1s ease-in-out;
  }
  @keyframes fadeSlide {
    from {opacity: 0;}
    to {opacity: 1;}
  }

  .prev, .next {
    cursor: pointer;
    position: absolute;
    top: 50%;
    width: auto;
    margin-top: -25px;
    padding: 12px;
    color: white;
    font-weight: bold;
    font-size: 2rem;
    border-radius: 50%;
    background: rgba(0,0,0,0.3);
    user-select: none;
    transition: background 0.3s;
  }
  .prev:hover, .next:hover { background: rgba(0,0,0,0.6); }
  .prev { left: 15px; }
  .next { right: 15px; }

  /* Mensaje final con fade-in */
  .mensaje {
    text-align: center;
    padding: 80px 20px;
    background: #f8f0ff;
    font-size: 1.6rem;
    animation: fadeInText 2s ease forwards;
  }
  @keyframes fadeInText {
    0% {opacity: 0; transform: translateY(30px);}
    100% {opacity: 1; transform: translateY(0);}
  }
  .mensaje p { margin: 20px 0; }
  .mensaje .contacto { font-weight: bold; color: #6a0dad; }

  /* Música automática */
  audio { display: none; }

  /* Responsivo */
  @media(max-width: 900px) {
    .slides { height: 300px; }
    .inicio { font-size: 4rem; letter-spacing: 1rem; }
  }
  @media(max-width: 500px) {
    .slides { height: 200px; }
    .inicio { font-size: 3rem; letter-spacing: 0.5rem; }
    .mensaje { font-size: 1.2rem; }
  }
</style>
</head>
<body>

<!-- Inicio con iniciales animadas -->
<div class="inicio"> A & Y  </div>

<!-- Slideshow elegante -->
<div class="slideshow-container">
  <img class="slides" src="foto1.jpeg" alt="Foto 1">
  <img class="slides" src="foto2.jpeg" alt="Foto 2">
  <img class="slides" src="foto3.jpeg" alt="Foto 3">
  <!-- Agrega más fotos si quieres -->

  <span class="prev" onclick="changeSlide(-1)">&#10094;</span>
  <span class="next" onclick="changeSlide(1)">&#10095;</span>
</div>

<!-- Mensaje final -->
<div class="mensaje">
  <p>Su compañía es nuestro regalo más preciado,</p>
  <p>sin embargo, cualquier muestra de cariño hacia nosotros puede realizarla a través de:</p>
  <p class="contacto">88869869</p>
  <p>O en una cajita que estará en la iglesia el día de la boda.</p>
</div>

<!-- Música automática -->
<audio autoplay loop>
  <source src="musica.mp3" type="audio/mpeg">
  Tu navegador no soporta audio.
</audio>

<script>
  let slideIndex = 0;
  const slides = document.getElementsByClassName("slides");

  function showSlide(n) {
    if (n >= slides.length) slideIndex = 0;
    if (n < 0) slideIndex = slides.length - 1;
    for (let i = 0; i < slides.length; i++) slides[i].style.display = "none";
    slides[slideIndex].style.display = "block";
  }

  function changeSlide(n) {
    slideIndex += n;
    showSlide(slideIndex);
  }

  function autoSlide() {
    slideIndex++;
    showSlide(slideIndex);
    setTimeout(autoSlide, 5000); // cambia cada 5 segundos
  }

  showSlide(slideIndex);
  autoSlide();
</script>

</body>
</html>
