<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Invitación de Boda</title>
<style>
    body {
        margin: 0;
        font-family: 'Arial', sans-serif;
        background: #c9f0e6; /* verde agua suave */
        color: #004d40; /* verde menta oscuro */
        overflow-x: hidden;
    }

    .hero {
        position: relative;
        width: 100%;
        height: 100vh;
        background: url('tu-foto-grande.jpeg') no-repeat center center/cover;
        display: flex;
        justify-content: center;
        align-items: center;
        flex-direction: column;
        text-align: center;
        color: #ffffff; /* texto blanco */
    }

    .hero h1 {
        font-size: 5em;
        margin: 0;
        letter-spacing: 10px;
    }

    .hero h2 {
        font-size: 2em;
        margin-top: 10px;
        color: #ffffff;
    }

    .overlay-initials {
        position: absolute;
        top: 20px;
        left: 20px;
        background: rgba(0, 77, 64, 0.5); /* verde menta semitransparente */
        padding: 20px 30px;
        border-radius: 15px;
        font-size: 2em;
        font-weight: bold;
        color: #ffffff;
    }

    .section {
        padding: 60px 20px;
        background: #e0f7f4; /* menta clara */
        color: #004d40;
        text-align: center;
    }

    .section h3 {
        font-size: 2em;
        margin-bottom: 20px;
    }

    .gallery img {
        width: 250px;
        margin: 10px;
        border-radius: 15px;
        transition: transform 0.3s;
    }

    .gallery img:hover {
        transform: scale(1.05);
    }

    .gift {
        font-size: 1.2em;
        margin-top: 20px;
        color: #004d40;
    }

    audio {
        display: none; /* música que se reproduce automáticamente */
    }
</style>
</head>
<body>

<div class="hero">
    <div class="overlay-initials">A & Y</div>
    <h1>Arlin & Yoel</h1>
    <h2>11 Abril 2026</h2>
</div>

<section class="section">
    <h3>Galería de Momentos</h3>
    <div class="gallery">
        <img src="foto1.jpeg" alt="Foto 1">
        <img src="foto2.jpeg" alt="Foto 2">
        <img src="foto3.jpeg" alt="Foto 3">
    </div>
</section>

<section class="section" style="background:#c9f0e6;">
    <h3>Su compañía es nuestro regalo más preciado</h3>
    <p class="gift">
        Sin embargo, cualquier muestra de cariño hacia nosotros puede realizarla a través de: <br>
        88869869 <br>
        O en una cajita que estará en la iglesia el día de la boda.
    </p>
</section>

<audio autoplay loop>
    <source src="musica.mp3" type="audio/mpeg">
</audio>

</body>
</html>
