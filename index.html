<!DOCTYPE html>
<html lang="es">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Arlin & Yoel</title>
        <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Montserrat&display=swap" rel="stylesheet">
        <style> body { margin: 0; font-family: 'Montserrat', sans-serif; background: #f0fff9; text-align: center; color: #333; }
            
<!-- Música -->
<audio id="music" loop>
  <source src="teamo.mp3" type="audio/mpeg">
</audio>

<button id="playBtn" class="music-btn">🎶</button>

<style>
body {
    margin: 0;
    font-family: 'Montserrat', sans-serif;
    background: linear-gradient(to bottom, #f0fff9, #d9f7ef);
    text-align: center;
    color: #333;
}

/* HEADER */
header {
    height: 100vh;
    background: linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.4)),
    url("foto1.jpeg");
    background-size: cover;
    background-position: center;
    color: white;
    display: flex;
    flex-direction: column;
    justify-content: center;
    animation: fadeIn 2s ease-in;
}

h1 {
    font-family: 'Great Vibes', cursive;
    font-size: 70px;
    margin: 0;
    text-shadow: 2px 2px 10px rgba(0,0,0,0.5);
}

h2 {
    font-weight: normal;
}

/* SECCIONES */
.section {
    padding: 60px 20px;
    animation: fadeUp 1s ease;
}

.countdown {
    font-size: 28px;
    color: #2e7d6b;
    font-weight: bold;
}

/* BOTÓN */
.button {
    display: inline-block;
    padding: 12px 20px;
    background: #6ecfb5;
    color: white;
    text-decoration: none;
    border-radius: 25px;
    margin-top: 15px;
    transition: 0.3s;
}

.button:hover {
    background: #4fb89c;
    transform: scale(1.05);
}

/* GALERÍA */
.gallery img {
    width: 300px;
    margin: 10px;
    border-radius: 15px;
    transition: 0.3s;
    box-shadow: 0 10px 20px rgba(0,0,0,0.2);
}

.gallery img:hover {
    transform: scale(1.05);
}

/* FOOTER */
.footer {
    background: #d9f7ef;
    padding: 20px;
}

/* BOTÓN MÚSICA */
.music-btn {
    position: fixed;
    bottom: 20px;
    right: 20px;
    background: #6ecfb5;
    border: none;
    border-radius: 50%;
    width: 60px;
    height: 60px;
    font-size: 25px;
    color: white;
    cursor: pointer;
    box-shadow: 0 5px 15px rgba(0,0,0,0.3);
}

/* ANIMACIONES */
@keyframes fadeIn {
    from {opacity: 0;}
    to {opacity: 1;}
}

@keyframes fadeUp {
    from {opacity: 0; transform: translateY(20px);}
    to {opacity: 1; transform: translateY(0);}
}
</style>

<script>
// 🎵 Música
const music = document.getElementById("music");
const playBtn = document.getElementById("playBtn");

playBtn.addEventListener("click", () => {
    if(music.paused){
        music.play();
        playBtn.innerHTML = "⏸️";
    } else {
        music.pause();
        playBtn.innerHTML = "🎶";
    }
});

// ⏳ Cuenta regresiva (la tuya intacta)
const countdown = document.getElementById("countdown");
const weddingDate = new Date("April 11, 2026 14:00:00").getTime();

function updateCountdown() {
    const now = new Date().getTime();
    const distance = weddingDate - now;

    if(distance < 0){
        countdown.innerHTML = "¡Estamos casados!";
        return;
    }

    const days = Math.floor(distance / (1000 * 60 * 60 * 24));
    const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
    const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
    const seconds = Math.floor((distance % (1000 * 60)) / 1000);

    countdown.innerHTML = `Faltan ${days} días, ${hours} horas, ${minutes} minutos y ${seconds} segundos 💚`;
}

setInterval(updateCountdown, 1000);
updateCountdown();
</script>
